<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Healthy Kuwait | Sign In</title>
  <style>
    :root {
      --bg: #f7fbf8;
      --surface: #ffffff;
      --surface-2: #eef7f1;
      --text: #173126;
      --muted: #5f776c;
      --primary: #1f8f5f;
      --primary-dark: #126847;
      --border: #d7e7dc;
      --shadow: 0 12px 30px rgba(21, 64, 45, 0.08);
      --radius: 20px;
      --max: 1200px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: Arial, Helvetica, sans-serif; font-size: 15px; background: var(--bg); color: var(--text); line-height: 1.5; }
    a { color: inherit; text-decoration: none; }

    .topbar { position: sticky; top: 0; z-index: 50; background: rgba(247, 251, 248, 0.88); border-bottom: 1px solid rgba(215, 231, 220, 0.85); }
    .nav { max-width: var(--max); margin: 0 auto; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 20px; }
    .nav-links { display: flex; gap: 15px; }
    .nav-cta { padding: 10px 14px; border-radius: 999px; background: var(--primary); color: #fff; font-weight: 700; }

    .container { width: min(calc(100% - 32px), var(--max)); margin: 0 auto; padding: 80px 0; }
    .signin-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow); max-width: 500px; margin: 0 auto; }
    .signin-card h2 { margin-bottom: 14px; }
    .form-control { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; }
    .form-checkbox { margin-bottom: 12px; display: flex; gap: 8px; align-items: center; }
    .signin-submit { width: 100%; padding: 12px 0; border-radius: 999px; border: none; background: var(--primary); color: #fff; font-weight: 700; cursor: pointer; }
    .signin-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    .signin-note { margin-top: 12px; color: var(--muted); font-size: 14px; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="nav">
      <a href="index.html" class="brand"><span>HK</span> Healthy Kuwait</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="profile.html" class="nav-cta">Profile</a>
      </div>
    </div>
  </header>

  <main class="container">
    <article class="signin-card">
      <h2>Sign In to Join the Campaign</h2>
      <p style="margin-bottom: 16px; color: var(--muted);">Verify you are not a robot and agree to terms to continue.</p>
      <form id="signup-form">
        <input class="form-control" type="text" id="name" placeholder="Full name" required>
        <input class="form-control" type="email" id="email" placeholder="Email address" required>
        <input class="form-control" type="password" id="password" placeholder="Password" required>
        <label class="form-checkbox"><input type="checkbox" id="notRobot"> I’m not a robot</label>
        <label class="form-checkbox"><input type="checkbox" id="agreeTerms"> I agree to the Terms of Service</label>
        <button class="signin-submit" type="submit" id="signup-button" disabled>Sign Up</button>
        <p class="signin-note">After signing up you will be redirected to your profile page.</p>
      </form>
    </article>
  </main>

  <script>
    const notRobot = document.getElementById('notRobot');
    const agreeTerms = document.getElementById('agreeTerms');
    const signupButton = document.getElementById('signup-button');
    const signupForm = document.getElementById('signup-form');

    function updateSignupBtn() {
      signupButton.disabled = !(notRobot.checked && agreeTerms.checked);
    }

    notRobot.addEventListener('change', updateSignupBtn);
    agreeTerms.addEventListener('change', updateSignupBtn);

    signupForm.addEventListener('submit', (e) => {
      e.preventDefault();
      if (!notRobot.checked || !agreeTerms.checked) return;
      const name = document.getElementById('name').value;
      localStorage.setItem('userName', name);
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
